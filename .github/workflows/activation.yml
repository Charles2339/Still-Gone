name: Get Unity License File

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  activation:
    name: Request Activation File
    runs-on: ubuntu-latest
    steps:
      - name: Request Unity Activation File (.alf)
        uses: game-ci/unity-request-activation-file@v2
        id: getalf
        with:
          unityVersion: 2022.3.45f1

      - name: Upload .alf for manual activation
        uses: actions/upload-artifact@v4
        with:
          name: Unity_v${{ steps.getalf.outputs.unity_version }}.alf
          path: ${{ steps.getalf.outputs.filePath }}
          retention-days: 7
